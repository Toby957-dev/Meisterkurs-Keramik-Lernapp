<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<title>Keramik Lern-Wiki</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#eef1f5;
}

header{
background:#111827;
color:white;
padding:15px;
font-size:22px;
display:flex;
justify-content:space-between;
align-items:center;
}

#search{
padding:8px;
font-size:15px;
border-radius:6px;
border:none;
width:260px;
}

.grid{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card:hover{
transform:translateY(-3px);
}

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:none;
align-items:center;
justify-content:center;
padding:30px;
}

.viewerBox{
background:white;
padding:25px;
border-radius:10px;
max-width:1000px;
display:flex;
gap:30px;
position:relative;
}

.viewer img{
max-width:450px;
max-height:70vh;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
}

@media(max-width:800px){

.viewerBox{
flex-direction:column;
align-items:center;
}

}

</style>

</head>

<body>

<header>

Keramik Lern-Wiki

<input id="search" placeholder="Begriff suchen...">

</header>

<div class="grid" id="grid"></div>

<div class="viewer" id="viewer">

const grid=document.getElementById("grid")

function render(data){

grid.innerHTML=""

data.forEach(item=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=item.title

card.onclick=()=>openViewer(item)

grid.appendChild(card)

})

}

function openViewer(item){

document.getElementById("viewer").style.display="flex"

document.getElementById("viewerImg").src="img/"+item.file

document.getElementById("viewerText").innerHTML="<h2>"+item.title+"</h2>"

}

function closeViewer(){

document.getElementById("viewer").style.display="none"

}

document.getElementById("search").addEventListener("input",function(){

let val=this.value.toLowerCase()

let filtered=wikiData.filter(i =>
i.title.toLowerCase().includes(val)
)

render(filtered)

})

render(wikiData)
